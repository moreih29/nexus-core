name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sync-verify:
    name: Verify nexus-core sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run sync
        run: bunx @moreih29/nexus-core sync --harness=opencode --target=./

      - name: Check for uncommitted changes
        run: |
          git diff --exit-code || (
            echo "Sync produced uncommitted changes. Run 'bun run sync' and commit the result."
            exit 1
          )

      - name: Type check
        run: bun x tsc --noEmit

      - name: Validate assets
        run: bunx @moreih29/nexus-core validate

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: sync-verify
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run sync
        run: bunx @moreih29/nexus-core sync --harness=opencode --target=./

      # npm publish는 프로젝트 요구에 맞게 조정하세요 (예: changesets, semantic-release 등).
      # - name: Publish
      #   run: npm publish --access public
      #   env:
      #     NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
