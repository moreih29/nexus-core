# nexus-core publish workflow
#
# **Fallback applied** (v0.1.0 → v0.1.1):
# The original plan was `bun publish` as primary (for sibling opencode-nexus
# consistency + Bun transition). v0.1.0 attempt failed with:
#
#     error: missing authentication (run `bunx npm login`)
#
# Root cause: bun publish does not read setup-node's NPM_CONFIG_USERCONFIG env
# var (/home/runner/work/_temp/.npmrc). Falling back to `npm publish` which
# reads the same .npmrc that setup-node creates — this is the sibling
# opencode-nexus pattern.
#
# Re-evaluation: plan session #2 Issue #7 reserved 6-month re-eval of Bun
# publish stability. Pinned .nexus/context/evolution.md reservation unchanged.
#
# Trigger: git tag push (pure semver) 또는 workflow_dispatch manual.
# Auth Day 1: Granular Access Token via NODE_AUTH_TOKEN env.
# Auth 전환 후: id-token:write로 OIDC 자동 (NODE_AUTH_TOKEN 라인 제거).

name: Publish npm package

on:
  workflow_dispatch:
    inputs:
      dry_run:
        type: boolean
        default: false
        description: "Pack only, skip publish"
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build + validate + publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Setup Node (for npm CLI)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          # NO registry-url here — would inject NODE_AUTH_TOKEN env, which
          # takes precedence over OIDC and routes publish through token auth.
          # OIDC works against the default npmjs.org registry without .npmrc.

      - name: Upgrade npm for OIDC Trusted Publishing
        # npm Trusted Publishing (OIDC) requires npm >= 11.5.1.
        # Node 22 LTS ships with npm 10.x, so upgrade explicitly.
        run: npm install -g npm@latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run validation
        run: bun run validate

      - name: Version match check (git tag vs package.json)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          PKG_VERSION=$(bun -e "console.log(require('./package.json').version)")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Version mismatch: package.json=$PKG_VERSION, git tag=$TAG_VERSION"
            exit 1
          fi
          echo "Version match: $PKG_VERSION"

      - name: Pack (dry-run verification)
        run: npm pack --dry-run

      - name: Publish to npm (OIDC Trusted Publishing)
        if: ${{ !inputs.dry_run }}
        run: npm publish --provenance --access public
        # No NODE_AUTH_TOKEN — OIDC via id-token:write permission above.
        # Trusted Publisher registered in npmjs.com for this repo+workflow.
