# nexus-core validate workflow
# Triggers test suite (src/ + scripts/) on PR/push.
# publish workflow는 publish-npm.yml에서 정의 — Issue #7 참조.

name: Validate

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'fix/**'
      - 'chore/**'
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  validate:
    name: Run test suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Diagnose git/env (why findProjectRoot returns /project)
        run: |
          echo "--- env (git|project|runner|tmp) ---"
          env | grep -iE 'git|project|runner|tmp' || true
          echo
          echo "--- git config --list --show-origin ---"
          git config --list --show-origin 2>&1 || true
          echo
          echo "--- git rev-parse --show-toplevel (cwd=repo) ---"
          git rev-parse --show-toplevel 2>&1 || true
          echo
          echo "--- git rev-parse --show-toplevel (cwd=/tmp) ---"
          cd /tmp && git rev-parse --show-toplevel 2>&1 || true
          echo
          echo "--- git rev-parse --show-toplevel (cwd=mktemp dir) ---"
          TD=$(mktemp -d)
          cd "$TD" && git rev-parse --show-toplevel 2>&1 || true
          echo "  tmp dir was: $TD"
          echo
          echo "--- /project inspection ---"
          ls -la /project 2>&1 || true
          stat /project 2>&1 || true
          echo
          echo "--- id / whoami ---"
          id; whoami

      - name: Diagnose bun runtime cwd/execSync behavior
        run: |
          bun -e '
            const { execSync } = require("child_process");
            const fs = require("fs"), os = require("os"), path = require("path");
            const safeExec = (cmd, opts) => { try { return execSync(cmd, opts).toString().trim(); } catch(e){ return "ERR: " + e.message; } };
            const origCwd = process.cwd();
            const pathsModuleAbs = path.join(origCwd, "src/shared/paths.ts");
            console.log("process.cwd():", origCwd);
            console.log("os.tmpdir():", os.tmpdir());
            console.log("process.env.TMPDIR:", process.env.TMPDIR);
            console.log("process.env.GITHUB_WORKSPACE:", process.env.GITHUB_WORKSPACE);
            console.log("git @ cwd (no opts):", safeExec("git rev-parse --show-toplevel"));
            const td = fs.mkdtempSync(path.join(os.tmpdir(), "diag-"));
            console.log("mkdtemp result:", td);
            console.log("git @ {cwd: td}:", safeExec("git rev-parse --show-toplevel", { cwd: td }));
            process.chdir(td);
            console.log("after process.chdir(td), process.cwd():", process.cwd());
            console.log("git @ cwd (after chdir, no opts):", safeExec("git rev-parse --show-toplevel"));
            console.log("git @ {cwd: td} (after chdir):", safeExec("git rev-parse --show-toplevel", { cwd: td }));
            // Call the real findProjectRoot via dynamic import (absolute path, since cwd changed)
            import(pathsModuleAbs).then(m => {
              console.log("findProjectRoot() [after chdir]:", m.findProjectRoot());
              console.log("findProjectRoot(td):", m.findProjectRoot(td));
              console.log("getNexusRoot() [after chdir]:", m.getNexusRoot());
              console.log("getNexusRoot(td):", m.getNexusRoot(td));
            }).catch(e => console.log("import err:", e.message));
          '

      - name: Run tests
        env:
          TMPDIR: /tmp
        run: bun run test
