# nexus-core validate workflow
# Triggers test suite (src/ + scripts/) on PR/push.
# publish workflow는 publish-npm.yml에서 정의 — Issue #7 참조.

name: Validate

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'fix/**'
      - 'chore/**'
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  validate:
    name: Run test suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        env:
          # GitHub Actions runner는 RUNNER_TEMP 이후 처리에서 TMPDIR이 /project로
          # 노출되는 경우가 있어 test의 mkdtempSync(os.tmpdir())가 EACCES 발생.
          # 명시적으로 /tmp 지정해 재현 경로 차단.
          TMPDIR: /tmp
        run: bun run test
